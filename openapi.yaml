  /api/v1/habits/{id}:
    patch:
      tags: [Habits]
      summary: Update a habit
      operationId: updateHabit
      description: |
        Partially updates a habit's mutable fields. Only the owner can update their habit.
        Updatable fields: name, intensity, redirect_url, visibility, tracking_method, plugin_id.
        Streak, goal_stage, and completion data cannot be modified via this endpoint.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the habit to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: "Solve 2 LeetCode problems"
                intensity:
                  $ref: "#/components/schemas/Intensity"
                tracking_method:
                  $ref: "#/components/schemas/TrackingMethod"
                plugin_id:
                  type: string
                  maxLength: 50
                  nullable: true
                redirect_url:
                  type: string
                  maxLength: 500
                  nullable: true
                visibility:
                  $ref: "#/components/schemas/Visibility"
            example:
              name: "Solve 2 LeetCode problems"
              intensity: "intense"
      responses:
        "200":
          description: Habit updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  data:
                    $ref: "#/components/schemas/Habit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not the owner of this habit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Habits]
      summary: Archive a habit
      operationId: archiveHabit
      description: |
        Archives a habit by setting `is_active` to false. The habit is NOT deleted --
        historical logs and streak data are preserved. The habit will no longer appear
        in the active habits list and will not count toward "perfect day" or group
        chain link calculations.

        The habit's streak is frozen (preserved at its current value). It can be
        viewed in the user's habit history on their profile.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the habit to archive.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Habit archived.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Habit archived successfully."
                      habit_id:
                        type: string
                        format: uuid
              example:
                status: "ok"
                data:
                  message: "Habit archived successfully."
                  habit_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not the owner of this habit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/habits/{id}/complete:
    post:
      tags: [Habits]
      summary: Complete a habit for today
      operationId: completeHabit
      description: |
        Marks a habit as completed for the current date (in user's timezone). This is the
        core interaction -- a single tap to log completion.

        **Server-side effects (in order):**
        1. Verify ownership and that the habit is active.
        2. Check not already completed today (returns 409 if duplicate).
        3. Insert a HabitLog row with `completed=true`.
        4. Update streak: if yesterday was also completed, increment `current_streak`;
           otherwise reset `current_streak` to 1. Update `longest_streak` if new record.
        5. Increment `total_completed`.
        6. Check goal_stage transitions based on `current_streak`:
           - 3 days -> "ignition", 10 -> "foundation", 21 -> "momentum", 66 -> "formed"
        7. Award XP and Sparks based on intensity (light=5, moderate=10, intense=20).
        8. If this is the user's FIRST EVER habit completion, award 50 bonus XP+Sparks.
        9. Check if ALL active habits are now completed today -> "perfect day" bonus (+25 XP+Sparks).
        10. Check streak milestones (7/30/100 days) -> bonus XP+Sparks + feed item.
        11. Insert group feed item for this completion.
        12. If milestone reached, trigger Status+Norm sequence via Gemini LLM.
        13. Update user rank if XP crosses a threshold (500/2000/5000/15000).

        **Returns:** The updated habit, points earned breakdown, streak info, whether
        perfect day was achieved, whether goal stage changed, and whether rank changed.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the habit to complete.
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                verification_source:
                  $ref: "#/components/schemas/VerificationSource"
                proof_url:
                  type: string
                  description: URL to a photo proof (for photo verification).
                  maxLength: 500
                  nullable: true
            example:
              verification_source: "manual"
      responses:
        "200":
          description: Habit completed. Returns rich completion result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  data:
                    type: object
                    properties:
                      habit:
                        $ref: "#/components/schemas/Habit"
                      points_earned:
                        type: object
                        description: Breakdown of XP and Sparks earned from this completion.
                        properties:
                          base:
                            type: integer
                            description: Points from habit intensity.
                            example: 10
                          perfect_day_bonus:
                            type: integer
                            description: Bonus for completing all habits today. 0 if not achieved.
                            example: 25
                          streak_milestone_bonus:
                            type: integer
                            description: Bonus for hitting a streak milestone (7/30/100). 0 if none.
                            example: 0
                          welcome_bonus:
                            type: integer
                            description: One-time bonus for first ever completion. 0 otherwise.
                            example: 0
                          total:
                            type: integer
                            description: Total XP and Sparks earned (same amount for both).
                            example: 35
                      streak:
                        type: object
                        properties:
                          current:
                            type: integer
                            example: 15
                          longest:
                            type: integer
                            example: 15
                          milestone_reached:
                            type: integer
                            nullable: true
                            description: The milestone hit (7, 30, or 100), or null if none.
                            example: null
                      perfect_day:
                        type: boolean
                        description: Whether all active habits are now completed for today.
                        example: true
                      goal_stage_changed:
                        type: boolean
                        description: Whether the goal stage transitioned (e.g., ignition -> foundation).
                        example: false
                      new_goal_stage:
                        $ref: "#/components/schemas/GoalStage"
                      rank_changed:
                        type: boolean
                        description: Whether the user's rank was promoted due to XP earned.
                        example: false
                      new_rank:
                        $ref: "#/components/schemas/Rank"
              example:
                status: "ok"
                data:
                  habit:
                    id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "Solve 1 LeetCode problem"
                    intensity: "moderate"
                    tracking_method: "plugin"
                    plugin_id: "leetcode"
                    redirect_url: "https://leetcode.com/problemset/"
                    visibility: "full"
                    is_active: true
                    current_streak: 15
                    longest_streak: 15
                    total_completed: 15
                    goal_stage: "foundation"
                    last_completed_date: "2026-03-25"
                    today_completed: true
                    created_at: "2026-03-10T10:00:00.000Z"
                    updated_at: "2026-03-25T14:30:00.000Z"
                  points_earned:
                    base: 10
                    perfect_day_bonus: 25
                    streak_milestone_bonus: 0
                    welcome_bonus: 0
                    total: 35
                  streak:
                    current: 15
                    longest: 15
                    milestone_reached: null
                  perfect_day: true
                  goal_stage_changed: false
                  new_goal_stage: "foundation"
                  rank_changed: false
                  new_rank: "silver"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not the owner of this habit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Habit not found or not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Habit already completed today.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: "error"
                error:
                  code: "ALREADY_COMPLETED"
                  message: "This habit has already been completed today."

  /api/v1/habits/{id}/miss:
    post:
      tags: [Habits]
      summary: Log a missed habit with reason
      operationId: logMiss
      description: |
        Logs that the user missed a habit for today with a reason. The streak PAUSES
        (does not reset to zero). This is part of the Grace System designed to prevent
        the "what-the-hell" effect.

        **Server-side effects:**
        1. Insert a MissLog with the reason category and optional free text.
        2. Asynchronously send the reason text to Gemini LLM for categorization and
           pattern signal extraction (e.g., "Thursday evening fatigue").
        3. The streak pauses -- current_streak is NOT decremented.
        4. Insert a group feed item (respects visibility setting -- if "minimal",
           group sees "missed" but not the reason or habit name).
        5. Return a supportive, non-punitive message generated by LLM or from templates.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the habit that was missed.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason_category]
              properties:
                reason_category:
                  $ref: "#/components/schemas/MissReason"
                reason_text:
                  type: string
                  description: Optional free-text explanation. Fed to LLM for pattern analysis.
                  maxLength: 500
                  nullable: true
                  example: "Had back-to-back meetings until 9 PM"
            example:
              reason_category: "busy"
              reason_text: "Had back-to-back meetings until 9 PM"
      responses:
        "200":
          description: Miss logged. Returns supportive message.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  data:
                    type: object
                    properties:
                      miss_log:
                        $ref: "#/components/schemas/MissLog"
                      supportive_message:
                        type: string
                        description: LLM-generated or template supportive message encouraging the user.
                        example: "Busy days happen. Your 14-day streak is still intact -- it pauses, never resets. Tomorrow is a fresh start."
              example:
                status: "ok"
                data:
                  miss_log:
                    id: "d4e5f6a7-b8c9-0123-def0-123456789abc"
                    habit_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    date: "2026-03-25"
                    reason_category: "busy"
                    reason_text: "Had back-to-back meetings until 9 PM"
                    grace_freeze_used: false
                    created_at: "2026-03-25T21:30:00.000Z"
                  supportive_message: "Busy days happen. Your 14-day streak is still intact -- it pauses, never resets. Tomorrow is a fresh start."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Habit not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/habits/{id}/logs:
    get:
      tags: [Habits]
      summary: Get habit completion logs
      operationId: getHabitLogs
      description: |
        Returns an array of daily log entries for a specific habit over a date range.
        Each entry includes completion status, verification source, and optional
        reflection data. Used for rendering heatmaps and progress charts.

        If no log exists for a date within the range, that date is included with
        `completed: false` and null fields. This ensures the Flutter client always
        gets a contiguous array of dates.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the habit.
          schema:
            type: string
            format: uuid
        - name: range
          in: query
          required: false
          description: Time range for logs. Defaults to "week" (last 7 days).
          schema:
            type: string
            enum: [week, month]
            default: week
          example: month
      responses:
        "200":
          description: Array of daily log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HabitLog"
              example:
                status: "ok"
                data:
                  - id: "e5f6a7b8-c9d0-1234-ef01-23456789abcd"
                    habit_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    date: "2026-03-25"
                    completed: true
                    verification_source: "manual"
                    proof_url: null
                    reflection_difficulty: 3
                    reflection_text: "Not too bad today"
                    completed_at: "2026-03-25T14:30:00.000Z"
                    created_at: "2026-03-25T14:30:00.000Z"
                  - id: null
                    habit_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    date: "2026-03-24"
                    completed: true
